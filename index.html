<title>Fraqshift</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 360px;
    background: #111;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 40px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.header img {
    width: 100%;
    display: block;
}

.banner {
    background: linear-gradient(45deg, #6a00ff, #9b00ff);
    padding: 20px;
}

.banner h2 {
    margin: 0;
    font-size: 18px;
}

.banner p {
    font-size: 13px;
    opacity: 0.85;
}

.link {
    display: flex;
    align-items: center;
    padding: 16px;
    border-top: 1px solid #222;
    text-decoration: none;
    color: white;
    transition: 0.25s;
}

.link:hover {
    background: #181818;
    transform: scale(1.02);
}

.icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    margin-right: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.icon svg {
    width: 22px;
    height: 22px;
}

/* COLORS */
.ig { 
	background:#E1306C; }
.tt { background: #000; }

.fb { background: #1877F2; }
.sp { background: #1db954; }
.yt { background: #ff0000; }

/* SNAP ICON COLOR */


.link:hover .icon {
    box-shadow: 0 0 12px #6a00ff, 0 0 25px #6a00ff;
}

.fab {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #6a00ff;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    box-shadow: 0 0 20px #6a00ff;
}
.snap-icon svg {
  width: 50px;  /* Justera storleken här */
  height: 50px;
}

/* Den gula bakgrunden */
.snap-bg {
  fill: #FFFC00;
}

/* Spöket: Vit fyllning och svart ram */
.snap-ghost {
  fill: #FFFFFF;        /* Vit fyllning */
  stroke: #000000;      /* Svart ram */
  stroke-width: 2.5px;  /* Tjocklek på ramen */
  stroke-linejoin: round;
}

/* Valfri hover-effekt */
.snap-icon:hover {
  opacity: 0.9;
  transform: scale(1.05);
  display: inline-block;
  transition: all 0.2s ease;
}
</style>
